<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>海盗争霸 | Pirate Battle</title>
<link href="https://fonts.googleapis.com/css2?family=Pirata+One&family=Crimson+Text:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --ocean-deep: #0a1628; --ocean-mid: #0f2847; --ocean-light: #1a4a6e;
  --amber: #d4a574; --amber-light: #e8c9a0; --amber-dark: #a07850;
  --crimson: #c0392b; --crimson-light: #e74c3c;
  --gold: #f1c40f; --gold-dark: #c9a40c;
  --text-light: #f0e6d6; --text-dim: #8a7a6a;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--ocean-deep);color:var(--text-light);font-family:'Crimson Text',Georgia,serif;overflow:hidden;height:100vh;width:100vw}
canvas#gameCanvas{display:block;position:absolute;top:0;left:0;z-index:1;cursor:crosshair}
canvas#minimapCanvas{position:fixed;bottom:16px;right:16px;z-index:10;width:160px;height:160px;border:2px solid var(--amber-dark);border-radius:6px;background:rgba(10,22,40,.8);display:none}
canvas#minimapCanvas.show{display:block}

/* Lobby */
#lobby{position:fixed;top:0;left:0;right:0;bottom:0;z-index:200;display:flex;justify-content:center;align-items:center;background:linear-gradient(180deg,#1a0a00 0%,var(--ocean-deep) 40%,var(--ocean-mid) 100%)}
#lobby.hidden{display:none}
.lobby-inner{text-align:center;max-width:520px;width:90%}
.lobby-title{font-family:'Pirata One',cursive;font-size:clamp(36px,7vw,64px);color:var(--gold);text-shadow:0 2px 0 var(--gold-dark),0 4px 20px rgba(241,196,15,.3);margin-bottom:4px;letter-spacing:2px}
.lobby-sub{font-style:italic;font-size:clamp(14px,2.5vw,20px);color:var(--amber);margin-bottom:40px;letter-spacing:3px}
.lobby-field{margin-bottom:28px}
.lobby-field label{display:block;font-size:14px;color:var(--amber-light);margin-bottom:8px;letter-spacing:1px;text-transform:uppercase}
.lobby-input{width:100%;padding:14px 20px;background:rgba(245,230,200,.08);border:1px solid var(--amber-dark);border-radius:4px;color:var(--text-light);font-family:'Crimson Text',serif;font-size:18px;text-align:center;outline:none;transition:border-color .3s,box-shadow .3s}
.lobby-input:focus{border-color:var(--gold);box-shadow:0 0 20px rgba(241,196,15,.15)}
.lobby-input::placeholder{color:var(--text-dim)}
.lobby-btn{display:inline-block;padding:16px 48px;background:linear-gradient(180deg,var(--crimson-light),var(--crimson));border:2px solid #922b21;border-radius:4px;color:var(--text-light);font-family:'Pirata One',cursive;font-size:22px;letter-spacing:2px;cursor:pointer;transition:all .2s;text-shadow:0 1px 2px rgba(0,0,0,.4);box-shadow:0 4px 15px rgba(192,57,43,.4),inset 0 1px 0 rgba(255,255,255,.1)}
.lobby-btn:hover{transform:translateY(-2px);box-shadow:0 6px 25px rgba(192,57,43,.5),inset 0 1px 0 rgba(255,255,255,.15)}
.lobby-btn:active{transform:translateY(0)}
.lobby-hint{margin-top:32px;font-size:14px;color:var(--text-dim);line-height:2}
.lobby-hint kbd{display:inline-block;background:rgba(245,230,200,.1);border:1px solid var(--amber-dark);border-radius:3px;padding:1px 8px;font-family:'Crimson Text',serif;font-size:13px;color:var(--amber)}

/* HUD */
#hud{position:fixed;top:0;left:0;right:0;z-index:10;pointer-events:none;display:none}
#hud.show{display:block}
.hud-top{display:flex;justify-content:space-between;align-items:flex-start;padding:16px 20px}
.hud-panel{background:rgba(10,22,40,.85);border:1px solid rgba(212,165,116,.2);border-radius:6px;backdrop-filter:blur(6px);padding:12px 16px;pointer-events:auto}
.hud-label{font-size:11px;color:var(--amber-dark);letter-spacing:2px;text-transform:uppercase;margin-bottom:4px}
.hud-hp-bar{width:200px;height:14px;background:rgba(255,255,255,.06);border:1px solid rgba(192,57,43,.3);border-radius:3px;overflow:hidden;margin-bottom:6px}
.hud-hp-fill{height:100%;background:linear-gradient(90deg,#922b21,var(--crimson-light));transition:width .3s;border-radius:2px}
.hud-hp-text{font-family:'Pirata One',cursive;font-size:18px;color:var(--crimson-light)}
.hud-score{text-align:center}
.hud-score-val{font-family:'Pirata One',cursive;font-size:32px;color:var(--gold);text-shadow:0 0 15px rgba(241,196,15,.3)}
.hud-wave{font-family:'Pirata One',cursive;font-size:14px;color:var(--amber);letter-spacing:1px}
.hud-kills{font-family:'Pirata One',cursive;font-size:16px;color:var(--crimson-light)}

/* Leaderboard */
#lb{position:fixed;top:80px;right:20px;z-index:10;min-width:200px;display:none}
#lb.show{display:block}
.lb-title{font-family:'Pirata One',cursive;font-size:16px;color:var(--gold);margin-bottom:8px;text-align:center;letter-spacing:1px}
.lb-row{display:flex;justify-content:space-between;align-items:center;padding:4px 8px;font-size:14px;border-bottom:1px solid rgba(212,165,116,.1)}
.lb-row.me{color:var(--gold);font-weight:600}
.lb-name{max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lb-sc{font-family:'Pirata One',cursive;font-size:15px}

/* Kill feed */
#kf{position:fixed;top:80px;left:20px;z-index:10;width:280px;pointer-events:none}
.kf-msg{padding:6px 12px;margin-bottom:4px;background:rgba(10,22,40,.8);border-left:3px solid var(--crimson);border-radius:0 4px 4px 0;font-size:13px;color:var(--amber-light);animation:kfIn .3s ease;transition:opacity .5s}
@keyframes kfIn{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:translateX(0)}}

/* Wave banner */
#waveBanner{position:fixed;top:45%;left:50%;transform:translate(-50%,-50%);z-index:50;text-align:center;pointer-events:none;opacity:0;transition:opacity .5s}
#waveBanner.show{opacity:1}
.wb-text{font-family:'Pirata One',cursive;font-size:56px;color:var(--gold);text-shadow:0 2px 0 var(--gold-dark),0 0 40px rgba(241,196,15,.4)}
.wb-sub{font-size:18px;color:var(--amber);margin-top:4px}

/* Death / Win overlay */
.overlay{position:fixed;top:0;left:0;right:0;bottom:0;z-index:100;background:rgba(10,5,0,.85);display:none;justify-content:center;align-items:center;flex-direction:column}
.overlay.show{display:flex}
.overlay-title{font-family:'Pirata One',cursive;font-size:48px;color:var(--crimson-light);text-shadow:0 0 30px rgba(231,76,60,.4);margin-bottom:20px}
.overlay-sub{font-size:20px;color:var(--amber);margin-bottom:30px}
.overlay-btn{padding:14px 40px;background:linear-gradient(180deg,var(--ocean-light),var(--ocean-mid));border:2px solid var(--amber-dark);border-radius:4px;color:var(--amber-light);font-family:'Pirata One',cursive;font-size:20px;cursor:pointer;transition:all .2s}
.overlay-btn:hover{border-color:var(--gold);box-shadow:0 0 20px rgba(241,196,15,.2)}

/* Controls hint */
#hint{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);z-index:10;font-size:13px;color:var(--text-dim);letter-spacing:1px;display:none;text-align:center}
#hint.show{display:block}
#hint kbd{background:rgba(245,230,200,.08);border:1px solid rgba(212,165,116,.2);border-radius:3px;padding:1px 6px;font-family:'Crimson Text',serif;font-size:12px;color:var(--amber)}

/* Win overlay */
#winOverlay .overlay-title{color:var(--gold);text-shadow:0 2px 0 var(--gold-dark),0 0 40px rgba(241,196,15,.5);font-size:56px}
#winOverlay .overlay-sub{font-family:'Pirata One',cursive;font-size:28px}
</style>
</head>
<body>

<canvas id="gameCanvas"></canvas>
<canvas id="minimapCanvas" width="160" height="160"></canvas>

<!-- LOBBY -->
<div id="lobby">
  <div class="lobby-inner">
    <div class="lobby-title">海盗争霸</div>
    <div class="lobby-sub">Pirate Battle</div>
    <div class="lobby-field">
      <label>你的船名</label>
      <input class="lobby-input" id="nameInput" type="text" placeholder="输入你的海盗名..." maxlength="16" autofocus>
    </div>
    <button class="lobby-btn" onclick="joinGame()">扬帆起航</button>
    <div class="lobby-hint">
      <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> 驾驶 &nbsp;|&nbsp;
      <kbd>鼠标</kbd> 瞄准 &nbsp;|&nbsp; <kbd>点击</kbd> 开炮<br>
      收集宝箱得分 · 击沉敌船得分 · 先到2000分获胜
    </div>
  </div>
</div>

<!-- HUD -->
<div id="hud">
  <div class="hud-top">
    <div class="hud-panel">
      <div class="hud-label">船体耐久</div>
      <div class="hud-hp-bar"><div class="hud-hp-fill" id="hpFill" style="width:100%"></div></div>
      <div class="hud-hp-text" id="hpText">100</div>
    </div>
    <div class="hud-panel hud-score">
      <div class="hud-wave" id="waveText"></div>
      <div class="hud-score-val" id="scoreText">0</div>
      <div class="hud-kills" id="killsText">击沉: 0</div>
    </div>
    <div class="hud-panel">
      <div class="hud-label">在线玩家</div>
      <div class="hud-kills" id="pCount">1</div>
    </div>
  </div>
</div>

<!-- LEADERBOARD -->
<div id="lb">
  <div class="hud-panel">
    <div class="lb-title">排行榜</div>
    <div id="lbBody"></div>
  </div>
</div>

<!-- KILL FEED -->
<div id="kf"></div>

<!-- WAVE BANNER -->
<div id="waveBanner">
  <div class="wb-text" id="wbText"></div>
  <div class="wb-sub" id="wbSub"></div>
</div>

<!-- CONTROLS HINT -->
<div id="hint">
  <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> 驾驶 &nbsp;|&nbsp;
  <kbd>鼠标</kbd> 瞄准 &nbsp;|&nbsp; <kbd>点击/按住</kbd> 开炮 &nbsp;|&nbsp;
  <kbd>Tab</kbd> 排行榜
</div>

<!-- DEATH -->
<div class="overlay" id="deathOverlay">
  <div class="overlay-title">船沉了...</div>
  <div class="overlay-sub">3秒后自动复活</div>
  <button class="overlay-btn" onclick="sock.emit('restart')">重新开始</button>
</div>

<!-- WIN -->
<div class="overlay" id="winOverlay">
  <div class="overlay-title" id="winTitle">胜利!</div>
  <div class="overlay-sub" id="winScore"></div>
  <button class="overlay-btn" onclick="sock.emit('restart')">再来一局</button>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
// ============================================================
// CLIENT STATE
// ============================================================
const C = document.getElementById('gameCanvas');
const X = C.getContext('2d');
const MC = document.getElementById('minimapCanvas');
const MX = MC.getContext('2d');

let sock = null, myId = null, mapSize = 3000, islands = [];
let gs = null; // game state from server
let cam = { x: 0, y: 0 };
let mouse = { x: 0, y: 0, down: false };
let keys = {};
let killMsgs = [];
let wbTimer = 0;
let lastHp = 100; let prevScore = 0; let prevCannonCount = 0;
// ============================================================
// AUDIO ENGINE (Web Audio API)
// ============================================================
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;

function initAudio() {
  if (audioCtx) return;
  audioCtx = new AudioCtx();
}

function playTone(freq, duration, type, vol, pan) {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  const panner = audioCtx.createStereoPanner();
  osc.type = type || 'sine';
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(vol || 0.15, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
  panner.pan.value = pan || 0;
  osc.connect(gain);
  gain.connect(panner);
  panner.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + duration);
}

function playNoise(duration, vol, pan) {
  if (!audioCtx) return;
  const bufSize = audioCtx.sampleRate * duration;
  const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (bufSize * 0.3));
  const src = audioCtx.createBufferSource();
  const gain = audioCtx.createGain();
  const panner = audioCtx.createStereoPanner();
  src.buffer = buf;
  gain.gain.value = vol || 0.1;
  panner.pan.value = pan || 0;
  src.connect(gain);
  gain.connect(panner);
  panner.connect(audioCtx.destination);
  src.start();
}

function sfxCannon(pan) { playNoise(0.3, 0.2, pan); playTone(80, 0.15, 'sine', 0.15, pan); }
function sfxHit(pan) { playNoise(0.15, 0.12, pan); playTone(200, 0.1, 'square', 0.08, pan); }
function sfxSink(pan) { playNoise(0.5, 0.2, pan); playTone(60, 0.4, 'sine', 0.15, pan); playTone(40, 0.6, 'sine', 0.1, pan); }
function sfxCollect(pan) { playTone(800, 0.1, 'sine', 0.1, pan); playTone(1200, 0.15, 'sine', 0.08, pan); setTimeout(() => playTone(1600, 0.1, 'sine', 0.06, pan), 80); }
function sfxDamage(pan) { playTone(120, 0.2, 'sawtooth', 0.12, pan); playNoise(0.1, 0.08, pan); }
function sfxJoin() { playTone(440, 0.15, 'sine', 0.06); setTimeout(() => playTone(660, 0.15, 'sine', 0.06), 100); }
function sfxWave() { playTone(330, 0.2, 'sine', 0.08); setTimeout(() => playTone(440, 0.2, 'sine', 0.08), 150); setTimeout(() => playTone(550, 0.3, 'sine', 0.08), 300); }



function resize() { C.width = innerWidth; C.height = innerHeight; }
addEventListener('resize', resize); resize();

// ============================================================
// INPUT
// ============================================================
addEventListener('keydown', e => { keys[e.key.toLowerCase()] = true; if (e.key === 'Tab') e.preventDefault(); });
addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });
C.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
C.addEventListener('mousedown', e => { if (e.button === 0) mouse.down = true; });
C.addEventListener('mouseup', e => { if (e.button === 0) mouse.down = false; });
C.addEventListener('contextmenu', e => e.preventDefault());

// ============================================================
// JOIN
// ============================================================
document.getElementById('nameInput').addEventListener('keydown', e => { if (e.key === 'Enter') joinGame(); });

function joinGame() {
  const name = document.getElementById('nameInput').value.trim() || '无名海盗';
  sock = io();
  initAudio();

  sock.on('joined', d => {
    myId = d.id; mapSize = d.mapSize; islands = d.islands;
    document.getElementById('lobby').classList.add('hidden');
    document.getElementById('hud').classList.add('show');
    document.getElementById('lb').classList.add('show');
    MC.classList.add('show');
    document.getElementById('hint').classList.add('show');
    requestAnimationFrame(loop);
  });

  sock.on('state', d => { gs = decode(d); });

  sock.on('wave_start', d => { sfxWave(); showBanner('第 ' + d.wave + ' 波', d.isBoss ? 'BOSS: ' + d.bossName : '准备迎战!'); });
  sock.on('wave_complete', d => { showBanner('第 ' + d.wave + ' 波', '波次清除!'); });
  sock.on('player_died', d => {
    if (d.id === myId) document.getElementById('deathOverlay').classList.add('show');
    const p = gs?.players?.[d.id];
    if (p) addKF(p.name + ' 沉没了');
  });
  sock.on('player_respawn', d => { if (d.id === myId) document.getElementById('deathOverlay').classList.remove('show'); });
  sock.on('player_joined', d => { sfxJoin(); addKF(d.name + ' 加入了战场'); });
  sock.on('player_left', d => { addKF(d.name + ' 离开了'); });
  sock.on('game_over', d => { showBanner('游戏结束', '总击杀: ' + d.totalKills); });
  sock.on('winner', d => {
    document.getElementById('winOverlay').classList.add('show');
    document.getElementById('winTitle').textContent = d.name + ' 获胜!';
    document.getElementById('winScore').textContent = '得分: ' + d.score;
  });
  sock.on('game_reset', () => {
    document.getElementById('deathOverlay').classList.remove('show');
    document.getElementById('winOverlay').classList.remove('show');
  });
  sock.on('server_shutdown', () => { addKF('服务器正在重启...'); });
  sock.on('error_msg', d => { addKF(d.msg); });
  sock.on('disconnect', () => {
    addKF('连接断开，正在重连...');
    document.getElementById('deathOverlay').classList.remove('show');
  });
  sock.on('reconnect', () => {
    addKF('重新连接成功!');
    sock.emit('join', { name: document.getElementById('nameInput').value.trim() || '无名海盗' });
  });
  sock.on('connect_error', () => {
    addKF('连接失败，正在重试...');
  });


  sock.emit('join', { name });
}

// ============================================================
// DECODE COMPACT STATE
// ============================================================
function decode(s) {
  const players = {};
  for (const [id, p] of Object.entries(s.p)) {
    players[id] = {
      id: p.id, name: p.n, x: p.x, y: p.y, angle: p.a,
      vx: p.vx, vy: p.vy, hp: p.hp, maxHp: p.mhp, color: p.c,
      score: p.sc, kills: p.kl, isDead: !!p.d, respawnTimer: p.rt, invuln: p.inv, damage: p.dmg,
    };
  }
  return {
    players,
    ai: s.a.map(a => ({
      id: a.id, name: a.n, x: a.x, y: a.y, angle: a.a,
      hp: a.hp, maxHp: a.mhp, color: a.c, score: a.sc, isDead: !!a.d, invuln: a.inv,
    })),
    cannonballs: s.b.map(b => ({ x: b.x, y: b.y })),
    treasures: s.t.map(t => ({ x: t.x, y: t.y, id: t.id })),
    effects: s.e.map(e => ({ type: e.t, x: e.x, y: e.y, life: e.l })),
    tick: s.k, mapSize: s.ms,
  };
}

// ============================================================
// HELPERS
// ============================================================
function showBanner(text, sub) {
  document.getElementById('wbText').textContent = text;
  document.getElementById('wbSub').textContent = sub;
  document.getElementById('waveBanner').classList.add('show');
  wbTimer = 120;
}
function addKF(msg) { killMsgs.unshift({ text: msg, life: 180 }); if (killMsgs.length > 5) killMsgs.pop(); }
function shake(n) { C.style.transform = 'translate(' + ((Math.random()-.5)*n) + 'px,' + ((Math.random()-.5)*n) + 'px)'; setTimeout(() => C.style.transform = '', 80); }

// ============================================================
// MAIN LOOP
// ============================================================
function loop() {
  requestAnimationFrame(loop);
  if (!gs || !myId) return;
  const me = gs.players[myId];
  if (!me) return;

  // Send input
  const aim = Math.atan2(mouse.y - C.height/2, mouse.x - C.width/2);
  sock.emit('input', { w: keys.w||false, a: keys.a||false, s: keys.s||false, d: keys.d||false, shoot: mouse.down, aimAngle: aim });
  // Sound: cannon fire (detect by cannonball count increase)
  if (gs.cannonballs.length > prevCannonCount + 2) { sfxCannon(0); }
  prevCannonCount = gs.cannonballs.length;

  // Camera
  cam.x += (me.x - C.width/2 - cam.x) * 0.12;
  cam.y += (me.y - C.height/2 - cam.y) * 0.12;

  // Shake on HP drop
  if (me.hp < lastHp - 5) { shake(6); sfxDamage(0); }
  lastHp = me.hp;

  // Wave banner
  if (wbTimer > 0) { wbTimer--; if (wbTimer <= 0) document.getElementById('waveBanner').classList.remove('show'); }

  // Kill feed decay
  for (let i = killMsgs.length - 1; i >= 0; i--) { killMsgs[i].life--; if (killMsgs[i].life <= 0) killMsgs.splice(i, 1); }

  // HUD
  document.getElementById('hpFill').style.width = (me.hp / me.maxHp * 100) + '%';
  document.getElementById('hpText').textContent = Math.ceil(me.hp);
  document.getElementById('scoreText').textContent = me.score;
  if (me.score > prevScore) { sfxCollect(0); }
  prevScore = me.score;
  document.getElementById('killsText').textContent = '击沉: ' + me.kills;
  document.getElementById('pCount').textContent = Object.keys(gs.players).length;

  render();
  renderMinimap();
}

// ============================================================
// RENDER
// ============================================================
function drawShip(s, cx, cy, isMe) {
  if (s.isDead) return;
  const sx = s.x - cx, sy = s.y - cy;
  if (sx < -60 || sx > C.width+60 || sy < -60 || sy > C.height+60) return;
  const flash = s.hitTimer > 0;
  const col = flash ? '#fff' : s.color;
  X.save(); X.translate(sx, sy); X.rotate(s.angle);
  // Shadow
  X.fillStyle = 'rgba(0,0,0,.3)';
  X.beginPath(); X.ellipse(3, 4, 26, 12, 0, 0, Math.PI*2); X.fill();
  // Hull
  X.fillStyle = col;
  X.beginPath();
  X.moveTo(28,0); X.quadraticCurveTo(20,-14,-10,-12); X.lineTo(-22,-6);
  X.quadraticCurveTo(-28,0,-22,6); X.lineTo(-10,12); X.quadraticCurveTo(20,14,28,0);
  X.closePath(); X.fill();
  // Ship wake (water trail)
  if (Math.abs(s.vx) > 0.3 || Math.abs(s.vy) > 0.3) {
    X.fillStyle = 'rgba(200, 230, 255, 0.15)';
    for (let w = 0; w < 3; w++) {
      const wx = -22 - w * 8;
      const wy = (w - 1) * 4;
      X.beginPath();
      X.ellipse(wx, wy, 4 + w * 3, 2 + w, 0, 0, Math.PI * 2);
      X.fill();
    }
  }

  // Deck
  X.strokeStyle = 'rgba(0,0,0,.2)'; X.lineWidth = 1;
  X.beginPath(); X.moveTo(20,0); X.lineTo(-18,0); X.stroke();
  // Mast
  X.fillStyle = '#3a2510'; X.fillRect(-2,-18,4,36);
  // Sail
  X.fillStyle = 'rgba(245,230,200,.85)';
  X.beginPath(); X.moveTo(0,-16); X.quadraticCurveTo(14,-8,14,0); X.quadraticCurveTo(14,8,0,16); X.closePath(); X.fill();
  // Flag
  X.fillStyle = s.isAI ? '#888' : (s.color || '#c0392b');
  X.beginPath(); X.moveTo(0,-18); X.lineTo(-10,-14); X.lineTo(0,-10); X.closePath(); X.fill();
  X.restore();
  // HP bar
  if (s.hp < s.maxHp) {
    const bw = 40, bh = 4, r = s.hp / s.maxHp;
    X.fillStyle = 'rgba(0,0,0,.5)'; X.fillRect(sx-bw/2, sy-28, bw, bh);
    X.fillStyle = r > .5 ? '#27ae60' : r > .25 ? '#f39c12' : '#c0392b';
    X.fillRect(sx-bw/2, sy-28, bw*r, bh);
  }
  // Name
  X.font = '12px "Crimson Text"'; X.textAlign = 'center';
  X.fillStyle = isMe ? '#f1c40f' : 'rgba(240,230,214,.7)';
  X.fillText(s.name, sx, sy+24);
  // Invuln
  if (s.invuln > 0) { X.strokeStyle = 'rgba(241,196,15,.3)'; X.lineWidth = 2; X.beginPath(); X.arc(sx,sy,30,0,Math.PI*2); X.stroke(); }
}

function render() {
  const w = C.width, h = C.height, cx = cam.x, cy = cam.y;
  // Sky
  const sg = X.createLinearGradient(0,0,0,h*.4);
  sg.addColorStop(0,'#1a0a00'); sg.addColorStop(.5,'#2d1810'); sg.addColorStop(1,'#0f2847');
  X.fillStyle = sg; X.fillRect(0,0,w,h);
  // Ocean
  const og = X.createLinearGradient(0,h*.3,0,h);
  og.addColorStop(0,'#0f2847'); og.addColorStop(1,'#0a1628');
  X.fillStyle = og; X.fillRect(0,h*.3,w,h*.7);
  // Horizon
  X.strokeStyle = 'rgba(212,165,116,.15)'; X.lineWidth = 1;
  X.beginPath(); X.moveTo(0,h*.35); X.lineTo(w,h*.35); X.stroke();
  // Grid
  X.strokeStyle = 'rgba(26,74,110,.15)'; X.lineWidth = 1;
  const gs = 100, sx0 = -cx%gs, sy0 = -cy%gs;
  for (let x=sx0;x<w;x+=gs){X.beginPath();X.moveTo(x,0);X.lineTo(x,h);X.stroke();}
  for (let y=sy0;y<h;y+=gs){X.beginPath();X.moveTo(0,y);X.lineTo(w,y);X.stroke();}
  // Water waves
  X.strokeStyle = 'rgba(26, 74, 110, 0.08)';
  X.lineWidth = 1.5;
  const waveT = gs ? gs.tick * 0.02 : 0;
  for (let wy = -200; wy < h + 200; wy += 40) {
    X.beginPath();
    for (let wx = -100; wx < w + 100; wx += 20) {
      const wy2 = wy + Math.sin((wx + cx * 0.3) * 0.01 + waveT + wy * 0.05) * 8;
      if (wx === -100) X.moveTo(wx, wy2);
      else X.lineTo(wx, wy2);
    }
    X.stroke();
  }


  // Islands
  for (const isl of islands) {
    const ix=isl.x-cx, iy=isl.y-cy;
    if (ix<-200||ix>w+200||iy<-200||iy>h+200) continue;
    X.fillStyle='rgba(0,0,0,.2)'; X.beginPath(); X.ellipse(ix+4,iy+6,isl.r*1.1,isl.r*.6,0,0,Math.PI*2); X.fill();
    const ig=X.createRadialGradient(ix-isl.r*.2,iy-isl.r*.2,0,ix,iy,isl.r);
    ig.addColorStop(0,'#5c8a3c'); ig.addColorStop(.6,'#3d6b2a'); ig.addColorStop(1,'#2a4f1a');
    X.fillStyle=ig; X.beginPath(); X.ellipse(ix,iy,isl.r,isl.r*.55,0,0,Math.PI*2); X.fill();
    X.strokeStyle='#c9a96e'; X.lineWidth=4; X.beginPath(); X.ellipse(ix,iy,isl.r+4,isl.r*.55+3,0,0,Math.PI*2); X.stroke();
  }

  // Treasures
  for (const t of gs.treasures) {
    const tx=t.x-cx, ty=t.y-cy;
    if (tx<-30||tx>w+30||ty<-30||ty>h+30) continue;
    const p=1+Math.sin(gs.tick*.05+t.id)*.15;
    X.shadowColor='#f1c40f'; X.shadowBlur=12;
    X.fillStyle='#f1c40f'; X.fillRect(tx-8*p,ty-6*p,16*p,12*p);
    X.fillStyle='#8b6914'; X.fillRect(tx-2,ty-6*p,4,12*p);
    X.shadowBlur=0;
  }

  // Cannonballs
  for (const b of gs.cannonballs) {
    const bx=b.x-cx, by=b.y-cy;
    X.fillStyle='#2c2c2c'; X.shadowColor='#ff6600'; X.shadowBlur=6;
    X.beginPath(); X.arc(bx,by,4,0,Math.PI*2); X.fill(); X.shadowBlur=0;
  }

  // AI ships
  for (const s of gs.ai) drawShip(s, cx, cy, false);
  // Player ships
  for (const s of Object.values(gs.players)) drawShip(s, cx, cy, s.id === myId);

  // Effects
  for (const e of gs.effects) {
    const ex=e.x-cx, ey=e.y-cy, a=e.life/(e.type==='sink'?30:15);
    if (e.type==='hit') { X.fillStyle='rgba(255,140,0,'+a+')'; X.beginPath(); X.arc(ex,ey,15*(1-a)+5,0,Math.PI*2); X.fill(); }
    else if (e.type==='sink') { X.strokeStyle='rgba(255,255,255,'+a+')'; X.lineWidth=2; X.beginPath(); X.arc(ex,ey,30*(1-a),0,Math.PI*2); X.stroke(); }
    else if (e.type==='collect') { X.fillStyle='rgba(241,196,15,'+a+')'; X.font='18px "Pirata One"'; X.textAlign='center'; X.fillText('+50',ex,ey-10*(1-a)); }
  }

  // Crosshair
  X.strokeStyle='rgba(212,165,116,.6)'; X.lineWidth=1.5;
  X.beginPath(); X.arc(mouse.x,mouse.y,12,0,Math.PI*2); X.stroke();
  X.beginPath(); X.moveTo(mouse.x-18,mouse.y);X.lineTo(mouse.x-6,mouse.y);X.moveTo(mouse.x+6,mouse.y);X.lineTo(mouse.x+18,mouse.y);X.moveTo(mouse.x,mouse.y-18);X.lineTo(mouse.x,mouse.y-6);X.moveTo(mouse.x,mouse.y+6);X.lineTo(mouse.x,mouse.y+18);X.stroke();

  // Kill feed
  const kfEl = document.getElementById('kf');
  kfEl.innerHTML = '';
  for (const km of killMsgs) { const d=document.createElement('div'); d.className='kf-msg'; d.textContent=km.text; d.style.opacity=km.life/180; kfEl.appendChild(d); }

  // Leaderboard
  const all = [
    ...Object.values(gs.players).map(p=>({name:p.name,score:p.score,id:p.id,color:p.color})),
    ...gs.ai.map(a=>({name:a.name,score:a.score,id:a.id,color:'#555'})),
  ].sort((a,b)=>b.score-a.score);
  const lbEl = document.getElementById('lbBody');
  lbEl.innerHTML = '';
  for (const p of all.slice(0,8)) {
    const d=document.createElement('div'); d.className='lb-row'+(p.id===myId?' me':'');
    d.innerHTML='<span class="lb-name" style="color:'+p.color+'">'+p.name+'</span><span class="lb-sc">'+p.score+'</span>';
    lbEl.appendChild(d);
  }

  // Compass
  const ccx=C.width/2, ccy=C.height-60, r=25;
  const me=gs.players[myId]; if(!me) return;
  X.save(); X.globalAlpha=.4; X.strokeStyle='#d4a574'; X.lineWidth=1.5;
  X.beginPath(); X.arc(ccx,ccy,r,0,Math.PI*2); X.stroke();
  X.font='10px "Crimson Text"'; X.fillStyle='#d4a574'; X.textAlign='center';
  X.fillText('N',ccx,ccy-r-4); X.fillText('S',ccx,ccy+r+12); X.fillText('E',ccx+r+8,ccy+4); X.fillText('W',ccx-r-8,ccy+4);
  X.globalAlpha=.7; X.strokeStyle='#f1c40f'; X.lineWidth=2;
  X.beginPath(); X.moveTo(ccx,ccy); X.lineTo(ccx+Math.cos(me.angle)*(r-4),ccy+Math.sin(me.angle)*(r-4)); X.stroke();
  X.restore();
}

// ============================================================
// MINIMAP
// ============================================================
function renderMinimap() {
  const mw=160, sc=mw/mapSize;
  MX.fillStyle='rgba(10,22,40,.9)'; MX.fillRect(0,0,mw,mw);
  MX.fillStyle='rgba(93,138,60,.5)';
  for (const isl of islands) { MX.beginPath(); MX.arc(isl.x*sc,isl.y*sc,isl.r*sc,0,Math.PI*2); MX.fill(); }
  MX.fillStyle='#f1c40f';
  for (const t of gs.treasures) MX.fillRect(t.x*sc-2,t.y*sc-2,4,4);
  MX.fillStyle='#888';
  for (const s of gs.ai) if(!s.isDead) MX.fillRect(s.x*sc-2,s.y*sc-2,4,4);
  for (const p of Object.values(gs.players)) {
    if (p.isDead) continue;
    MX.fillStyle = p.id===myId ? '#f1c40f' : p.color;
    const sz = p.id===myId ? 5 : 3;
    MX.fillRect(p.x*sc-sz/2, p.y*sc-sz/2, sz, sz);
  }
  MX.strokeStyle='rgba(255,255,255,.3)'; MX.lineWidth=1;
  MX.strokeRect(cam.x*sc, cam.y*sc, C.width*sc, C.height*sc);
}
